<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fall to bed</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.player{
    width:350px;
    background:#181818;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.cover{
    width:100%;
    border-radius:15px;
    overflow:hidden;
}

.cover img{
    width:100%;
    display:block;
}

.info{
    margin-top:20px;
}

.title{
    font-size:24px;
    font-weight:bold;
}

.artist{
    margin-top:5px;
    color:#b3b3b3;
    font-size:14px;
}

.progress-container{
    margin-top:20px;
}

.progress-bar{
    width:100%;
    height:5px;
    background:#404040;
    border-radius:10px;
    overflow:hidden;
}

.progress{
    width:35%;
    height:100%;
    background:#1db954;
}

.time{
    display:flex;
    justify-content:space-between;
    margin-top:5px;
    font-size:12px;
    color:#b3b3b3;
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    margin-top:25px;
}

.controls button{
    background:none;
    border:none;
    color:white;
    cursor:pointer;
    font-size:18px;
    transition:0.2s;
}

.controls button:hover{
    color:#1db954;
}

.play{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#1db954 !important;
    color:black !important;
    font-size:22px !important;
    font-weight:bold;
}

.play:hover{
    transform:scale(1.08);
}

.download{
    margin-top:25px;
    text-align:center;
}

.download a{
    color:#1db954;
    text-decoration:none;
    font-size:14px;
}

audio{
    display:none;
}
</style>
</head>
<body>

<div class="player">

    <div class="cover">
        <img src="cover.jpg" alt="Cover Lagu">
    </div>

    <div class="info">
        <div class="title">Fall to bed</div>
        <div class="artist">Your Music</div>
    </div>

    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <div class="time">
            <span>1:12</span>
            <span>3:45</span>
        </div>
    </div>

    <div class="controls">
        <button>⏮</button>

        <button class="play" onclick="togglePlay()">▶</button>

        <button>⏭</button>
    </div>

    <div class="download">
        <a href="Fall to bed.mp3" download>
            Download Lagu
        </a>
    </div>

    <audio id="audio">
        <source src="Fall to bed.mp3" type="audio/mpeg">
    </audio>

</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.querySelector(".play");

function togglePlay(){

    if(audio.paused){
        audio.play();
        playBtn.innerHTML = "❚❚";
    }else{
        audio.pause();
        playBtn.innerHTML = "▶";
    }

}
</script>

</body>
</html>
