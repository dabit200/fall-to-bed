<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .player {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }

        h2 {
            margin-bottom: 15px;
        }

        audio {
            width: 100%;
            margin-bottom: 15px;
        }

        .download-btn {
            display: inline-block;
            padding: 10px 18px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="player">
        <h2>Fall to bed</h2>

        <!-- Pemutar Audio -->
        <audio controls>
            <source src="Fall to bed.mp3" type="audio/mpeg">
            Browser Anda tidak mendukung audio.
        </audio>

        <br>

        <!-- Tombol Download -->
        <a class="download-btn" href="Fall to bed.mp3" download>
            Download Audio
        </a>
    </div>

</body>
</html>
