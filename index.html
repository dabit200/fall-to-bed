<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fall to Bed</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#050816;
      position:relative;
    }

    /* Background Glow */
    .bg{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:0;
    }

    .circle{
      position:absolute;
      border-radius:50%;
      filter:blur(120px);
      opacity:.35;
      animation:float 10s infinite ease-in-out;
    }

    .c1{
      width:300px;
      height:300px;
      background:#00ffe1;
      top:-80px;
      left:-80px;
    }

    .c2{
      width:350px;
      height:350px;
      background:#7c3aed;
      bottom:-100px;
      right:-100px;
      animation-delay:2s;
    }

    .c3{
      width:220px;
      height:220px;
      background:#ff008c;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      animation-delay:4s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-30px);
      }
    }

    /* Card */
    .player{
      position:relative;
      z-index:2;
      width:380px;
      padding:35px;
      border-radius:35px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:
      0 0 40px rgba(0,0,0,.5),
      inset 0 0 25px rgba(255,255,255,.05);
      text-align:center;
      color:white;
      animation:fade 1.2s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* Album */
    .album{
      width:170px;
      height:170px;
      margin:auto;
      border-radius:50%;
      background:
      linear-gradient(145deg,#00ffe1,#7c3aed,#ff008c);
      padding:6px;
      animation:spin 8s linear infinite;
      box-shadow:
      0 0 35px rgba(0,255,225,.5),
      0 0 55px rgba(124,58,237,.4);
    }

    .album-inner{
      width:100%;
      height:100%;
      border-radius:50%;
      background:#111827;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:65px;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    h1{
      margin-top:28px;
      font-size:34px;
      font-weight:700;
      letter-spacing:1px;
    }

    .subtitle{
      margin-top:8px;
      color:#cbd5e1;
      font-size:15px;
      font-weight:300;
    }

    /* Audio */
    .audio-box{
      margin-top:28px;
      padding:14px;
      border-radius:20px;
      background:rgba(255,255,255,0.06);
      box-shadow:inset 0 0 12px rgba(255,255,255,.05);
    }

    audio{
      width:100%;
      border-radius:12px;
    }

    /* Credit */
    .credit{
      margin-top:24px;
      font-size:16px;
      color:#dbeafe;
    }

    .credit span{
      color:#00ffe1;
      font-weight:700;
      text-shadow:0 0 12px #00ffe1;
    }

    /* TikTok */
    .social{
      margin-top:25px;
    }

    .social a{
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:14px;
      border-radius:18px;
      color:white;
      font-weight:600;
      background:linear-gradient(135deg,#111827,#1f2937);
      transition:.35s;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 0 15px rgba(0,0,0,.3);
    }

    .social a:hover{
      transform:translateY(-4px) scale(1.03);
      background:linear-gradient(135deg,#00ffe1,#7c3aed);
      box-shadow:
      0 0 25px rgba(0,255,225,.5),
      0 0 40px rgba(124,58,237,.4);
    }

    .social i{
      font-size:24px;
    }

    /* Small Floating Particles */
    .particle{
      position:absolute;
      width:6px;
      height:6px;
      background:white;
      border-radius:50%;
      opacity:.4;
      animation:particles 8s linear infinite;
    }

    .p1{ top:10%; left:15%; animation-delay:0s;}
    .p2{ top:80%; left:25%; animation-delay:2s;}
    .p3{ top:50%; left:90%; animation-delay:4s;}
    .p4{ top:30%; left:70%; animation-delay:6s;}

    @keyframes particles{
      0%{
        transform:translateY(0px);
        opacity:.2;
      }
      50%{
        transform:translateY(-25px);
        opacity:1;
      }
      100%{
        transform:translateY(0px);
        opacity:.2;
      }
    }

  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>

    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
  </div>

  <!-- Music Player -->
  <div class="player">

    <div class="album">
      <div class="album-inner">
        🎵
      </div>
    </div>

    <h1>Fall to Bed</h1>
    <div class="subtitle">
      Relax and enjoy the atmosphere
    </div>

    <div class="audio-box">
      <audio controls autoplay>
        <source src="Fall to bed.mp3" type="audio/mpeg">
        Browser Anda tidak mendukung audio.
      </audio>
    </div>

    <div class="credit">
      Dibuat oleh <span>Dabit Ganteng</span>
    </div>

    <div class="social">
      <a href="https://tiktok.com/@dabitreal" target="_blank">
        <i class="fa-brands fa-tiktok"></i>
        @dabitreal
      </a>
    </div>

  </div>

</body>
</html>
